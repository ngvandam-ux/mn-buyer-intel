# Fly.io config for the mn-buyer-intel API.
# Rename `app` if the name is taken: `fly apps create <name>` then update here.
app = "mn-buyer-intel-api"
primary_region = "ord"  # Chicago — closest to Minnesota

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# Secrets (set with `fly secrets set`, never commit):
#   DATABASE_URL       postgres://...   (Supabase DIRECT connection, pgvector enabled)
#   BASIC_AUTH_USER    <user>
#   BASIC_AUTH_PASS    <pass>
#   WEB_ORIGIN         https://<your-netlify-site>.netlify.app
